<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThinFat Studio | Acceso Privado</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .gate-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .gate-card {
            background-color: var(--card-bg);
            border: 1px solid #1a1a1a;
            padding: 40px;
            border-radius: 8px;
            max-width: 400px;
            width: 100%;
        }
        .gate-card h2 {
            color: var(--text-main);
            font-size: 1.6rem;
            margin-bottom: 10px;
        }
        .gate-card p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 25px;
        }
        .gate-form input {
            width: 100%;
            background-color: #0a0a0a;
            border: 1px solid #222;
            padding: 12px 15px;
            color: var(--text-main);
            text-align: center;
            font-size: 1.1rem;
            letter-spacing: 2px;
            border-radius: 4px;
            margin-bottom: 15px;
            transition: border-color 0.3s ease;
        }
        .gate-form input:focus {
            outline: none;
            border-color: var(--accent-neon);
        }
        .gate-btn {
            background-color: var(--accent-neon);
            color: #000;
            border: none;
            width: 100%;
            padding: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .gate-btn:hover {
            background-color: #fff;
        }
        .error-msg {
            color: #ff4444;
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="gate-wrapper">
        <div class="gate-card">
            <div style="color: var(--accent-neon); font-size: 2rem; margin-bottom: 15px;">🔒</div>
            <h2>Acceso Exclusivo</h2>
            <p>Introduce la clave de acceso para ver la propuesta de diseño de ThinFat Studio.</p>
            
            <form class="gate-form" onsubmit="checkPassword(event)">
                <input type="password" id="passInput" placeholder="••••••••" required>
                <button type="submit" class="gate-btn">Entrar al Proyecto</button>
                <div id="error" class="error-msg">Clave incorrecta. Inténtalo de nuevo.</div>
            </form>
        </div>
    </div>

    <script>
        function checkPassword(event) {
            event.preventDefault();
            const password = document.getElementById('passInput').value;
            if (password === 'ThinFat2010.sa') {
                window.location.href = 'inicio.html';
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }
    </script>

</body>
</html>
